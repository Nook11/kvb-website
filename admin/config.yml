backend:
  name: git-gateway
  branch: main # หรือ master แล้วแต่ชื่อ Branch หลักของคุณ

media_folder: "imges" # บอกว่ารูปที่อัปโหลดใหม่จะไปอยู่ที่โฟลเดอร์ imges
public_folder: "/imges"

collections:
  - name: "pages" # ตั้งชื่อกลุ่มของเนื้อหา
    label: "Page Content" # ชื่อที่จะแสดงในระบบหลังบ้าน
    files:
      - file: "index.html" # ระบุว่าเราจะแก้ไขไฟล์ index.html
        label: "Homepage" # ชื่อของหน้านี้ในระบบหลังบ้าน
        name: "homepage"
        fields: # รายการช่องข้อมูลที่จะให้ Admin แก้ไข
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Hero Subtitle", name: "hero_subtitle", widget: "text"}
          - {label: "Hero Logo", name: "hero_logo", widget: "image"}
