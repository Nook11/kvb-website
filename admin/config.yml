backend:
  name: git-gateway
  branch: main

media_folder: "imges"
public_folder: "/imges"

collections:
  - name: "pages"
    label: "Page Content"
    files:
      - file: "index.html"
        label: "Homepage"
        name: "homepage"
        fields:
          - { label: "Hero: Logo", name: "hero_logo", widget: "image" }
          - { label: "Hero: Main Title", name: "hero_title", widget: "string" }
          - { label: "Hero: Subtitle", name: "hero_subtitle", widget: "text" }
          - { label: "Hero: Email Button", name: "hero_email", widget: "string" }
          - { label: "Services Overview: Title", name: "services_title", widget: "string" }
          - { label: "Services Overview: Subtitle", name: "services_subtitle", widget: "string" }
          - { label: "Machine Parts: Title", name: "parts_title", widget: "string" }
          - { label: "Machine Parts: Description", name: "parts_description", widget: "markdown" }
          - { label: "Machine Parts: Brands (1 per line)", name: "parts_brands", widget: "textarea" }
          - { label: "Machine Parts: Image", name: "parts_image", widget: "image" }
          - { label: "Products: Title", name: "products_title", widget: "string" }
          - { label: "Products: Subtitle", name: "products_subtitle", widget: "string" }

      - file: "service2.html"
        label: "Air Condition Service Page"
        name: "service_aircon"
        fields:
          - { label: "Header: Title", name: "header_title_s2", widget: "string" }
          - { label: "Header: Subtitle", name: "header_subtitle_s2", widget: "string" }
          - { label: "Card 1 (Cleaning): Image", name: "card1_image_s2", widget: "image" }
          - { label: "Card 1 (Cleaning): Title", name: "card1_title_s2", widget: "string" }
          - { label: "Card 1 (Cleaning): Description", name: "card1_desc_s2", widget: "string" }
          - { label: "Card 1 (Cleaning): List (1 per line)", name: "card1_list_s2", widget: "textarea" }
          - { label: "Card 2 (Repair): Image", name: "card2_image_s2", widget: "image" }
          - { label: "Card 2 (Repair): Title", name: "card2_title_s2", widget: "string" }
          - { label: "Card 2 (Repair): Description", name: "card2_desc_s2", widget: "string" }
          - { label: "Card 2 (Repair): List (1 per line)", name: "card2_list_s2", widget: "textarea" }

      - file: "service3.html"
        label: "Training Course Page"
        name: "service_training"
        fields:
          - { label: "Header: Title", name: "header_title_s3", widget: "string" }
          - { label: "Header: Subtitle", name: "header_subtitle_s3", widget: "string" }
          - { label: "Main: Image", name: "main_image_s3", widget: "image" }
          - { label: "Main: Title", name: "main_title_s3", widget: "string" }
          - { label: "Objectives: Title", name: "objectives_title_s3", widget: "string" }
          - { label: "Objectives: List (1 per line)", name: "objectives_list_s3", widget: "textarea" }
          - { label: "Outline: Title", name: "outline_title_s3", widget: "string" }
          - { label: "Outline: List (1 per line)", name: "outline_list_s3", widget: "textarea" }
